workflow_id: treatment
category: treatment
description: >-
  Treatment items track medical procedures, therapies, diagnostic tests,
  and rehabilitation activities.

branches:
  - name: fnol-acute-care
    trigger: First notice of loss (FNOL) received with reported injury
    instructions: >-
      Close any existing acute-care items that are superseded by the new FNOL
      information. Open an item to receive initial diagnosis (sub_category:
      acute-care, owner: provider, urgency: milestone-protecting, deadline:
      3 business days from FNOL).

  - name: diagnosis-and-treatment
    trigger: Diagnosis and treatment plan established or changed by treating physician
    instructions: >-
      1. Close the acute-care item if one exists (diagnosis has been received).
      
      2. Delete superseeded diagnosis entities if they exist.

      3. Cancel any existing authorization or treatment-monitoring items that are
      for superseeded diagnosis and treatment plan.

      4. Create new diagnosis entities avoiding duplicates. 

      5. Open an item for authorization review (sub_category: authorization,
      owner: adjuster, urgency: deadline-driven, deadline: 5 business days from diagnosis, context entity: new diagnosis).

      6. if there are already authorized treatments entities that are no longer applicable, create new to do items for them
      (sub_category: treatment-authorization-discrepancy, owner: adjuster, urgency: discretionary, deadline: 5 business days from plan change, context entity: authorized treatment) 
      to investigate and resolve the discrepancy between the treatment plan and what has already been authorized.

  - name: treatment-plan-changed
    trigger: Treatment plan changed by physician without a new diagnosis
    instructions: >-
      1. Identify impacted diagnosis entity id.
      
      2. Using context entity id for diagnosis entity to filter to do items, cancel existing open authorization and treatment-monitoring items for the
      no longer applicable treatments. 
      
      3. Open an item for authorization review of the new treatments if needed (sub_category: authorization, owner: adjuster, urgency:
      deadline-driven, deadline: 5 business days from plan change).

      4. if there are already authorized treatments entities that are no longer applicable, create new to do items for them
      (sub_category: treatment-authorization-discrepancy, owner: adjuster, urgency: discretionary, deadline: 5 business days from plan change, context entity: authorized treatment) 
      to investigate and resolve the discrepancy between the treatment plan and what has already been authorized.

  - name: diagnostic-test-authorized
    trigger: New diagnostic test authorized
    instructions: >-
      1. Close the authorization item for this diagnostic test if one exists.

      2. Create treatment entity for diagnostic test if needed (avoid duplicates).

      3. Open item to monitor diagnostic test completion (sub_category:
      treatment-monitoring, owner: injured-worker, urgency: deadline-driven,
      deadline: 5 business days from authorization, context entity: new diagnostic test).

  - name: diagnostic-test-performed
    trigger: Diagnostic test performed or results received
    instructions: >-
      1. Close the treatment-monitoring item for this diagnostic test if one
      exists.

  - name: intervention-authorized
    trigger: New intervention authorized (medication, therapy, procedure)
    instructions: >-
      1. Close the authorization item for this intervention if one exists.
      
      2. Create treatment entity for intervention if needed (avoid duplicates).

      3. If surgery, open items for surgical scheduling (sub_category:
      surgical-scheduling, owner: adjuster, urgency: milestone-protecting)
      and post-operative rehabilitation plan review (sub_category:
      post-op-rehab, owner: adjuster, urgency: discretionary, deadline:
      15 business days from authorization, context: new treatment entity).
      
      4. Open item to monitor intervention completion (sub_category:
      treatment-monitoring, owner: injured-worker, urgency: deadline-driven,
      deadline: 5 business days from authorization, context: new treatment entity).

  - name: intervention-performed
    trigger: Intervention performed or completed
    instructions: >-
      Close the treatment-monitoring item for this intervention if one exists.
      If surgery performed, close the surgical-scheduling item for this
      surgery.

  - name: rehabilitation-plan-reviewed
    trigger: Rehabilitation plan reviewed
    instructions: >-
      Close the post-op-rehab item for this surgery if one exists.

  - name: follow-up-recommended
    trigger: Follow-up care recommended after a procedure
    instructions: >-
      Open an item to schedule specific follow-up appointments and track
      completion (sub_category: follow-up-care, owner: adjuster, urgency:
      discretionary, deadline: 5 business days from recommendation).

  - name: mmi-reached
    trigger: Maximum medical improvement (MMI) reached
    instructions: >-
      Close any remaining treatment-monitoring items. Open an item to obtain
      final medical report and coordinate impairment rating (sub_category:
      mmi-evaluation, owner: adjuster, urgency: milestone-protecting,
      deadline: 14 business days from MMI determination).

  - name: treatment-completed
    trigger: Treatment completed or discontinued with documented outcome
    instructions: >-
      Close the treatment-monitoring item for this treatment.

  - name: claimant-declines-treatment
    trigger: Claimant declines or withdraws from treatment
    instructions: >-
      Cancel any open treatment items related to the declined treatment.

  - name: authorization-denied
    trigger: Treatment or diagnostic test authorization revoked or denied on review
    instructions: >-
      Cancel the authorization item for this treatment or test if one still
      exists. Cancel the treatment-monitoring item if one exists.

exclusions:
  - administrative or financial tasks -- those belong in other categories

owner_guidance:
  - owner: provider
    when: >-
      items requiring medical action (scheduling, performing,
      or reporting on treatments and tests)
  - owner: injured-worker
    when: >-
      items the claimant must carry out (attending appointments,
      following prescribed care)
  - owner: adjuster
    when: items requiring claims oversight (authorizations, follow-ups)

defaults:
  when_in_doubt: leave_open
