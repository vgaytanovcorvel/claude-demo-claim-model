category: litigation
description: >-
  Litigation items track discrete legal tasks: filing or responding to motions,
  preparing for and attending depositions, hearings, and mediations,
  and coordinating with counsel.

close_rules:
  - when: >-
      the event confirms the specific task described
      in that item has been performed
    detail: >-
      Match the item's description to the
      event — do not close based on loosely related activity.

cancel_rules:
  - when: >-
      the event explicitly states the legal step will not
      occur
    example: >-
      'opposing counsel withdrew the motion', 'deposition cancelled
      by agreement of parties'
  - never: >-
      an item based on inference about legal strategy. The event
      must explicitly state the step is withdrawn, waived, or no longer required

sub_categories:
  - name: attorney-representation
    close_rules:
      - when: representation acknowledged and defense counsel assigned
    cancel_rules:
      - when: representation withdrawn by claimant
  - name: lawsuit-response
    close_rules:
      - when: response filed with the court
    cancel_rules:
      - when: case dismissed or settled before response due
  - name: subpoena-response
    close_rules:
      - when: subpoena complied with or successfully quashed
    cancel_rules:
      - when: subpoena withdrawn by issuing party
  - name: hearing-preparation
    close_rules:
      - when: preparation completed and event attended
    cancel_rules:
      - when: hearing or deposition cancelled by agreement of parties
  - name: court-order-compliance
    close_rules:
      - when: ordered action completed
    cancel_rules:
      - when: order vacated or reversed on appeal

defaults:
  when_in_doubt: leave_open
  reason: >-
    Prematurely closing litigation items
    risks missed deadlines with court sanctions.
  notes:
    - >-
      A postponement or continuance is NOT a close or cancel — the task remains open.

open_rules:
  preamble: >-
    Only open items when the event contains a concrete legal trigger.
    Each item must describe a specific, actionable task — not a vague category.
  triggers:
    - when: Formal notice of attorney representation received
      sub_category: attorney-representation
      action: >-
        open item to acknowledge representation and assign defense counsel
    - when: Lawsuit, complaint, or petition filed
      sub_category: lawsuit-response
      action: >-
        open item for each required response (e.g., 'file answer to complaint by [deadline]')
    - when: Subpoena served
      sub_category: subpoena-response
      action: open item to respond to or comply with the subpoena
    - when: Deposition, hearing, or mediation scheduled
      sub_category: hearing-preparation
      action: >-
        open a preparation item (e.g., 'prepare exhibits for deposition of [witness]')
        and an attendance item if adjuster presence is required
    - when: Court order requiring action
      sub_category: court-order-compliance
      action: open item for each specific action ordered
  exclusions:
    - Casual mentions of attorneys or legal topics without a concrete action needed.
    - "Medical, employment, or financial tasks — those belong in other categories."
    - Tasks that duplicate an existing open item.
    - Speculative future litigation steps not yet triggered by the event.

owner_guidance:
  - owner: adjuster
    when: >-
      items requiring claims-side legal coordination (gathering documents,
      coordinating with defense counsel)
  - owner: other
    when: >-
      items handled by attorneys or legal teams (filing motions, attending
      hearings, conducting depositions)
