category: employment
description: >-
  Employment items track return-to-work activities, job accommodations,
  vocational rehabilitation, and work capacity assessments.

close_rules:
  - when: the claimant has successfully returned to work

cancel_rules:
  - when: >-
      the claimant separates from the employer
      for unrelated reasons

sub_categories:
  - name: modified-duty-placement
    close_rules:
      - when: modified duty placement confirmed by employer
    cancel_rules:
      - when: >-
          medical condition makes return to work permanently infeasible
      - when: claimant separates from employer
  - name: fce
    close_rules:
      - when: FCE completed and results received
    cancel_rules:
      - when: >-
          FCE no longer needed (e.g., claimant cleared without it)
  - name: vocational-rehab
    close_rules:
      - when: rehabilitation plan established with counselor
    cancel_rules:
      - when: vocational reassignment replaces original RTW plan
  - name: employer-accommodation
    close_rules:
      - when: employer confirms accommodations in place
    cancel_rules:
      - when: claimant separates from employer
  - name: return-to-work-confirmation
    close_rules:
      - when: claimant returned and resumed duties confirmed
    cancel_rules:
      - when: medical condition worsens, clearance revoked
  - name: modified-duty-offer
    close_rules:
      - when: claimant acknowledges modified duty offer
    cancel_rules:
      - when: offer rescinded by employer
      - when: claimant separates from employer

open_rules:
  preamble: >-
    Only open items when the event contains a concrete employment trigger.
    Each item must describe a specific, actionable task — not a vague category.
  triggers:
    - when: Return-to-work planning initiated or work restrictions issued
      sub_category: modified-duty-placement
      action: >-
        open item to coordinate modified duty placement with employer
    - when: Functional capacity evaluation (FCE) ordered
      sub_category: fce
      action: >-
        open item to schedule FCE, notify claimant, and track completion
    - when: Vocational rehabilitation recommended
      sub_category: vocational-rehab
      action: >-
        open item to refer to vocational counselor and establish rehabilitation plan
    - when: Employer accommodations needed for returning worker
      sub_category: employer-accommodation
      action: >-
        open item to initiate interactive process with employer
    - when: Claimant cleared for full duty by treating physician
      sub_category: return-to-work-confirmation
      action: >-
        open item to confirm return-to-work date and verify resumed duties
    - when: Modified duty placement identified by employer
      sub_category: modified-duty-offer
      action: >-
        open item to document modified duty offer and obtain claimant acknowledgment
  exclusions:
    - "medical treatments or financial tasks."

owner_guidance:
  - owner: employer
    when: >-
      items requiring workplace action (accommodations, modified duty,
      return-to-work coordination)
  - owner: injured-worker
    when: >-
      items the claimant must carry out (attending evaluations,
      reporting to work)
  - owner: adjuster
    when: >-
      items requiring claims oversight (coordinating vocational rehab,
      monitoring return-to-work progress)
  - owner: provider
    when: >-
      items requiring medical input (functional capacity evaluations,
      work restriction assessments)

defaults:
  when_in_doubt: leave_open
