category: compliance
description: >-
  Compliance items track regulatory filings, statutory deadlines,
  audit requirements, and jurisdictional reporting obligations.

close_rules:
  - when: >-
      the required filing or report has been
      submitted and acknowledged by the regulatory body
  - when: an audit has been completed and findings resolved
  - when: >-
      the statutory deadline has been met with
      documented evidence of compliance

cancel_rules:
  - when: >-
      a regulatory change eliminates the
      requirement entirely
  - when: >-
      the claim is withdrawn before the compliance
      obligation arises
  - never: >-
      compliance items simply because they are difficult or
      time-consuming — regulatory obligations must be met

open_rules:
  preamble: >-
    Only open items when the event contains a concrete compliance trigger.
    Each item must describe a specific, actionable task — not a vague category.
  triggers:
    - when: Regulatory filing deadline triggered by claim event
      action: >-
        open item to prepare and submit the required filing
    - when: Jurisdictional notice required for claimant or employer
      action: >-
        open item to draft, review, and mail notice with proof of service
    - when: Audit or review mandated by regulatory body
      action: >-
        open item to compile documentation and schedule review
    - when: Statutory benefit notices due to the claimant
      action: >-
        open item to generate and send notices within statutory timeframe
    - when: OSHA reporting triggered by workplace injury
      action: >-
        open item for employer to complete OSHA log and file required reports
    - when: Acceptance or denial letter deadline approaching
      action: >-
        open item to issue acceptance or denial letter within statutory window
  exclusions:
    - "treatment, employment, or financial tasks."

owner_guidance:
  - owner: adjuster
    when: >-
      most compliance items (filing reports, meeting statutory deadlines,
      sending required notices)
  - owner: employer
    when: >-
      items requiring employer regulatory action (OSHA reporting,
      workplace safety compliance)

defaults:
  when_in_doubt: leave_open
